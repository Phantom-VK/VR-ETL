<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VR-ETL Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">VR-ETL Agent</p>
      <h1>Cyber Ireland 2022 Chat</h1>
    </div>
    <div class="status-bar">
      <span id="status" class="status-chip">Ready</span>
    </div>
  </header>

  <main class="app-shell">
    <section class="chat-card">
      <div id="chatLog" class="chat-log">
        <div class="msg assistant">
          <div class="bubble">
            Ask a question about the Cyber Ireland 2022 report. I’ll stream my reasoning then the final answer.
          </div>
        </div>
      </div>
      <div class="composer">
        <textarea id="question" rows="2" placeholder="Type your question and hit Send..."></textarea>
        <button id="runBtn">Send</button>
      </div>
    </section>

    <aside class="settings-card">
      <h3>Settings</h3>
      <div class="field">
        <label for="searchTemp">PageIndex temperature (search)</label>
        <input id="searchTemp" type="number" step="0.1" value="0.1" />
      </div>
      <div class="field">
        <label for="answerTemp">DeepSeek reasoner temperature (answer)</label>
        <input id="answerTemp" type="number" step="0.1" value="0.2" />
      </div>
      <p class="muted small">Future: multi-turn will reuse chat history above.</p>
    </aside>
  </main>

  <script src="app.js"></script>
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";
    mermaid.initialize({ startOnLoad: true, theme: "dark" });
  </script>
</body>
</html>
