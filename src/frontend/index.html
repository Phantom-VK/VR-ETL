<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VR-ETL QA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h1>VR-ETL Q&A</h1>
    <div class="row">
      <div>
        <label for="apiBase">API Base URL</label>
        <input id="apiBase" value="http://localhost:8000" />
      </div>
      <div>
        <label for="searchModel">Search Model (default: REASONING_MODEL)</label>
        <select id="searchModel"></select>
      </div>
    </div>
    <div class="row">
      <div>
        <label for="answerModel">Answer Model (default: CHAT_MODEL)</label>
        <select id="answerModel"></select>
      </div>
      <div>
        <label for="temperatureSearch">Search Temperature (default 0.1)</label>
        <input id="temperatureSearch" type="number" step="0.1" value="0.1" />
      </div>
    </div>
    <div class="row">
      <div>
        <label for="temperatureAnswer">Answer Temperature (default 0.2)</label>
        <input id="temperatureAnswer" type="number" step="0.1" value="0.2" />
      </div>
      <div>
        <label for="question">Question</label>
        <textarea id="question" rows="4" placeholder="Ask about the Cyber Ireland 2022 report...">What are the conclusions in this document?</textarea>
      </div>
    </div>
    <div class="small" style="margin-top:8px;">Uses default tree at <code>data/processed/pageindex_tree.json</code></div>
    <button id="runBtn">Run /answer (stream)</button>
    <div id="status" class="small" style="margin-top:8px;">Ready</div>
  </div>

  <div class="card">
    <h2>Reasoning</h2>
    <pre id="thinking">(run a query to see reasoning)</pre>
  </div>

  <div class="card">
    <h2>Selected Nodes</h2>
    <pre id="nodes">(none yet)</pre>
  </div>

  <div class="card">
    <h2>Answer</h2>
    <pre id="answer">(waiting)</pre>
  </div>

  <script src="app.js"></script>
</body>
</html>
