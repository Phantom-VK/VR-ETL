<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VR-ETL QA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="layout">
    <header class="card header">
      <div>
        <p class="eyebrow">VR-ETL Agent</p>
        <h1>Query the Cyber Ireland 2022 Report</h1>
        <p class="muted">Select models, tweak temperatures, and stream the agent's reasoning and answer live.</p>
      </div>
    </header>

    <section class="card grid">
      <div class="field">
        <label for="apiBase">API Base URL</label>
        <input id="apiBase" value="http://localhost:8000" />
      </div>
      <div class="field">
        <label for="searchModel">Search Model (REASONING_MODEL)</label>
        <select id="searchModel"></select>
      </div>
      <div class="field">
        <label for="temperatureSearch">Search Temperature (default 0.1)</label>
        <input id="temperatureSearch" type="number" step="0.1" value="0.1" />
      </div>
      <div class="field">
        <label for="answerModel">Answer Model (CHAT_MODEL)</label>
        <select id="answerModel"></select>
      </div>
      <div class="field">
        <label for="temperatureAnswer">Answer Temperature (default 0.2)</label>
        <input id="temperatureAnswer" type="number" step="0.1" value="0.2" />
      </div>
    </section>

    <section class="card">
      <label for="question">Question</label>
      <textarea id="question" rows="4" placeholder="Ask about the Cyber Ireland 2022 report...">What are the conclusions in this document?</textarea>
      <div class="toolbar">
        <span class="muted">Uses tree at data/processed/pageindex_tree.json</span>
        <button id="runBtn">Run /chat (stream)</button>
      </div>
      <div id="status" class="status">Ready</div>
    </section>

    <section class="card two-col">
      <div>
        <h2>Reasoning</h2>
        <pre id="thinking" class="panel">(run a query to see reasoning)</pre>
      </div>
      <div>
        <h2>Selected Nodes</h2>
        <pre id="nodes" class="panel">(none yet)</pre>
      </div>
    </section>

    <section class="card">
      <h2>Answer</h2>
      <pre id="answer" class="panel">(waiting)</pre>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
