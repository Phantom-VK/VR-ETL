<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VR-ETL QA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="layout">
    <header class="card header">
      <div>
        <p class="eyebrow">VR-ETL Agent</p>
        <h1>Query the Cyber Ireland 2022 Report</h1>
        <p class="muted">Provide a question and watch the reasoning and answer stream live.</p>
      </div>
    </header>

    <section class="card grid">
      <div class="field">
        <label for="searchTemp">PageIndex temperature (search)</label>
        <input id="searchTemp" type="number" step="0.1" value="0.1" />
      </div>
      <div class="field">
        <label for="answerTemp">DeepSeek reasoner temperature (answer)</label>
        <input id="answerTemp" type="number" step="0.1" value="0.2" />
      </div>
    </section>

    <section class="card">
      <label for="question">Question</label>
      <textarea id="question" rows="4" placeholder="Ask about the Cyber Ireland 2022 report...">What are the conclusions in this document?</textarea>
      <div class="toolbar">
        <span class="muted">Uses tree at data/processed/pageindex_tree.json</span>
        <button id="runBtn">Run query</button>
      </div>
      <div id="status" class="status">Ready</div>
    </section>

    <section class="card two-col">
      <div>
        <h2>Reasoning</h2>
        <pre id="thinking" class="panel">(run a query to see reasoning)</pre>
      </div>
      <div>
        <h2>Answer</h2>
        <pre id="answer" class="panel">(waiting)</pre>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
  <script type="module">
    import mermaid from \"https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs\";
    mermaid.initialize({ startOnLoad: true, theme: \"dark\" });
  </script>
</body>
</html>
